name: AutoSound — Daily Telegram → SoundCloud

on:
  schedule:
    # Runs every day at 06:00 UTC
    - cron: "0 6 * * *"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write  # needed to commit updated state.json back to the repo

jobs:
  sync:
    name: Download & Upload
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Check out the repo (includes state.json) ─────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch with a token that can push back the updated state
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Set up Python ────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # ── 3. Install dependencies ─────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Run AutoSound ─────────────────────────────────────────────────────
      - name: Run AutoSound
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}
          # Pre-issued SoundCloud OAuth token (required for CI — no browser available):
          SOUNDCLOUD_OAUTH_TOKEN: ${{ secrets.SOUNDCLOUD_OAUTH_TOKEN }}
          # Optional: limit messages scanned per run (omit for unlimited / catch-all)
          TELEGRAM_FETCH_LIMIT: "50"
        run: python main.py

      # ── 5. Commit updated state.json ─────────────────────────────────────────
      # state.json tracks the last processed Telegram message ID so the next
      # run only fetches new messages.
      - name: Commit updated state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          # Only commit if there is actually a change
          git diff --cached --quiet || git commit -m "chore: update state after sync [skip ci]"
          git push
